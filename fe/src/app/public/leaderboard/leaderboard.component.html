<h1>Leaderboards</h1>
<a routerLink="/">Home</a>
<!-- TODO user based home -->
@let leaderboardSlots = leaderboards();
@if (leaderboardSlots === undefined) {
  <app-loading />
} @else {
  @for (slot of leaderboardSlots; track $index) {
    @if (slot === undefined) {
      <app-loading />
    } @else if (slot.success) {
      <app-leaderboard-table [leaderboard]="slot.result" [user]="user()" />
    } @else {
      <p>{{ slot.error.message }}</p>
    }
  }
}
