<div class="page-container center">
  <img src="/images/logo-white.png" height="200" />
  <h1>Admin</h1>
  <form class="flex column" [formGroup]="form" (ngSubmit)="login()">
    <mat-form-field>
      <mat-label>Username</mat-label>
      <input formControlName="username" type="text" placeholder="Username" matInput />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Password</mat-label>
      <input formControlName="password" type="password" placeholder="Password" matInput />
    </mat-form-field>
    <button type="submit" [disabled]="form.invalid" matButton="outlined">Login</button>
    <span class="error-text">
      @if (error()) {
        {{ error() }}
      }
    </span>
  </form>
</div>
